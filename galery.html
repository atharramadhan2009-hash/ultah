<!-- VIEWER ZOOM -->
<div class="viewer" id="viewer">
<button class="closeBtn" id="closeViewer">⬅ Kembali</button>
<div class="viewerContent" id="viewerContent"></div>
</div>

<script>

const medias = document.querySelectorAll(".media");
const viewer = document.getElementById("viewer");
const viewerContent = document.getElementById("viewerContent");
const closeViewer = document.getElementById("closeViewer");
const bgMusic = document.getElementById("bgMusic");

let activeVideo = null;

/* buka zoom */

medias.forEach(media => {

media.addEventListener("click", ()=>{

viewer.style.display="flex";
viewerContent.innerHTML="";

bgMusic.pause();

if(media.tagName === "VIDEO"){

let vid = document.createElement("video");
vid.src = media.querySelector("source").src;
vid.controls = true;
vid.autoplay = true;
vid.style.maxWidth="95%";
vid.style.maxHeight="90%";

viewerContent.appendChild(vid);
activeVideo = vid;

}else{

let img = document.createElement("img");
img.src = media.src;
img.style.maxWidth="95%";
img.style.maxHeight="90%";

viewerContent.appendChild(img);

}

});

});

/* tutup zoom */

closeViewer.addEventListener("click", ()=>{

viewer.style.display="none";
viewerContent.innerHTML="";

if(activeVideo){
activeVideo.pause();
activeVideo=null;
}

bgMusic.play();

});

</script>
